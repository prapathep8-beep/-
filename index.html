<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ถึงนกุล ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff);
    font-family:Arial,sans-serif;
    text-align:center;
    overflow:hidden;
}

.box{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    color:#ff4f87;
}

button{
    font-size:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff4f87;
    color:white;
}

#no{
    background:#ddd;
    position:relative;
}


.heart{
    position:fixed;
    font-size:25px;
    animation:float 3s linear forwards;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-400px) scale(1.8);
        opacity:0;
    }
}

</style>

</head>

<body>


<div class="box">

<h1>ขอโทษนะ ❤️</h1>

<p>
เรารู้ว่าทำให้เองโกรธ<br>
เราขอโอกาสแก้ตัวได้ไหม 🥺
</p>

<button id="yes">ให้อภัย ❤️</button>

<button id="no">ไม่ให้อภัย</button>

</div>


<script>

const no=document.getElementById("no");

function moveButton(){

    const maxX=window.innerWidth-150;
    const maxY=window.innerHeight-80;

    no.style.position="fixed";
    no.style.left=Math.random()*maxX+"px";
    no.style.top=Math.random()*maxY+"px";

}


no.addEventListener("mouseover",moveButton);


no.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveButton();
});



document.getElementById("yes").onclick=()=>{


    // สร้างหัวใจลอย
    for(let i=0;i<40;i++){

        const heart=document.createElement("div");

        heart.className="heart";
        heart.innerHTML="❤️";

        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=(window.innerHeight-50)+"px";

        heart.style.animationDuration=(2+Math.random()*2)+"s";

        document.body.appendChild(heart);


        setTimeout(()=>{
            heart.remove();
        },4000);

    }



    setTimeout(()=>{

        document.body.innerHTML=`

        <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#ffe6ef;
        text-align:center;
        font-family:Arial;
        ">

            <div>

                <h1 style="font-size:48px;">
                🥹❤️
                </h1>

                <h1 style="color:#ff4f87;">
                ขอบคุณนะเอง
                </h1>

                <h2>
                เราสัญญาว่าจะไม่ทำแบบนี้อีกแล้ว
                </h2>

                <h3>
                รักเองที่สุดเลย 🤍
                </h3>

            </div>

        </div>

        `;

    },1200);


};


</script>


</body>
</html>
